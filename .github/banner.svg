<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="f" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <linearGradient id="gloss" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="18" fill="url(#g)" />

  <!-- Diagonal soft shapes -->
  <g opacity="0.18" fill="#ffffff">
    <ellipse cx="280" cy="60" rx="220" ry="80" transform="rotate(-20 280 60)" />
    <ellipse cx="920" cy="240" rx="240" ry="90" transform="rotate(-30 920 240)" />
  </g>

  <!-- Subtle pattern -->
  <g fill-opacity="0.04" fill="#000000">
    <rect x="40" y="40" width="60" height="60" rx="8" />
    <rect x="120" y="40" width="60" height="60" rx="8" />
    <rect x="200" y="40" width="60" height="60" rx="8" />
    <rect x="280" y="40" width="60" height="60" rx="8" />
  </g>

  <!-- Card for text -->
  <g transform="translate(60,70)">
    <rect width="1080" height="160" rx="12" fill="#ffffff" opacity="0.06" />
    <rect width="1080" height="160" rx="12" fill="url(#gloss)" />

    <!-- Main name -->
    <text x="40" y="70" fill="#ffffff" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="48" font-weight="700">Stackarius</text>

    <!-- Subtitle -->
    <text x="40" y="110" fill="#e6e6e6" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="20">Software engineer · Mobile & web apps · Trading AI experiments</text>

    <!-- Pill badges -->
    <g transform="translate(40,130)">
      <rect x="0" y="8" width="220" height="32" rx="16" fill="#0ea5e9" opacity="0.14" />
      <text x="18" y="30" fill="#ffffff" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14">Dart • Flutter • Node.js</text>

      <rect x="260" y="8" width="220" height="32" rx="16" fill="#7c3aed" opacity="0.14" />
      <text x="278" y="30" fill="#ffffff" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="14">Open-source • UX-focused</text>
    </g>
  </g>

  <!-- Small accent logo (initials) -->
  <g transform="translate(980,28)">
    <circle cx="50" cy="50" r="50" fill="#ffffff" opacity="0.14" />
    <text x="50" y="64" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="34" font-weight="700">S</text>
  </g>

</svg>
